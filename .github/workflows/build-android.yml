name: Build Android Debug APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest"

      - name: Create .env.local
        run: |
          cat > .env.local << 'ENVEOF'
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_APP_NAME=Honiara Taxi Network
          VITE_APP_VERSION=1.0.0
          VITE_COMPANY_NAME=MereSimi Studios Ltd
          VITE_MAP_CENTER_LAT=-9.4333
          VITE_MAP_CENTER_LNG=160.0520
          VITE_MAP_DEFAULT_ZOOM=13
          VITE_SERVICE_RADIUS_KM=30
          VITE_CUSTOMER_SUB_PRICE=20
          VITE_VEHICLE_SUB_PRICE=20
          VITE_GPS_INTERVAL_MS=20000
          VITE_DISPATCH_TIMEOUT_MS=30000
          ENVEOF

      - name: Create google-services.json
        run: |
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      - name: Install npm dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install @capacitor/assets
        run: npm install -g @capacitor/assets

      - name: Build web app
        run: npm run build

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Generate icons and splash screens
        run: |
          npx @capacitor/assets generate \
            --android \
            --iconBackgroundColor '#0A0C0F' \
            --iconBackgroundColorDark '#0A0C0F' \
            --splashBackgroundColor '#0A0C0F' \
            --splashBackgroundColorDark '#0A0C0F'

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HTN-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
