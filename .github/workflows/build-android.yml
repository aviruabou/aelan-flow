name: Build Android APK

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build & Sign Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # No cache: 'npm' — it requires package-lock.json which is gitignored.
      # The lock file is generated fresh by npm install each build.
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licences
        run: yes | sdkmanager --licenses || true

      - name: Install Android build tools
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "cmdline-tools;latest"

      - name: Create .env.local
        run: |
          cat > .env.local << 'ENVEOF'
          VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_VAPID_KEY=${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_APP_NAME=Honiara Taxi Network
          VITE_APP_VERSION=1.0.0
          VITE_COMPANY_NAME=MereSimi Studios Ltd
          VITE_MAP_CENTER_LAT=-9.4333
          VITE_MAP_CENTER_LNG=160.0520
          VITE_MAP_DEFAULT_ZOOM=13
          VITE_SERVICE_RADIUS_KM=30
          VITE_CUSTOMER_SUB_PRICE=20
          VITE_VEHICLE_SUB_PRICE=20
          VITE_GPS_INTERVAL_MS=20000
          VITE_DISPATCH_TIMEOUT_MS=30000
          ENVEOF

      # FIX: Decode keystore BEFORE assembleRelease so build.gradle can find it
      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/htn-release.jks

      - name: Create google-services.json
        run: |
          mkdir -p android/app
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > android/app/google-services.json

      # FIX: npm install (not npm ci) — no package-lock.json in repo
      - name: Install npm dependencies
        run: npm install

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Install @capacitor/assets
        run: npm install -g @capacitor/assets

      - name: Build web app (Vite)
        run: npm run build

      # FIX: cap sync runs BEFORE icon generation and BEFORE chmod gradlew.
      # cap sync generates: android/gradlew, android/app/build.gradle,
      # android/app/src/main/res/ folders, and all Capacitor plugin bindings.
      - name: Capacitor sync Android
        run: npx cap sync android

      # FIX: Icon generation runs AFTER cap sync so res/ folders exist
      - name: Generate app icons and splash screens
        run: |
          npx @capacitor/assets generate \
            --android \
            --iconBackgroundColor '#0A0C0F' \
            --iconBackgroundColorDark '#0A0C0F' \
            --splashBackgroundColor '#0A0C0F' \
            --splashBackgroundColorDark '#0A0C0F'

      # FIX: gradlew exists now (generated by cap sync above)
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # Keystore already at android/app/htn-release.jks from decode step above
      - name: Build release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Sign release APK
        uses: r0adkll/sign-android-release@v1
        id: sign_apk
        with:
          releaseDirectory: android/app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          alias:            ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword:      ${{ secrets.ANDROID_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: '34.0.0'

      - name: Rename signed APK
        run: |
          DATE=$(date +'%Y%m%d')
          cp "${{ steps.sign_apk.outputs.signedReleaseFile }}" \
             "HTN-v1.0.0-${DATE}-release.apk"

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: HTN-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

      - name: Upload signed release APK
        uses: actions/upload-artifact@v4
        with:
          name: HTN-release-apk-signed
          path: HTN-v1.0.0-*-release.apk
          retention-days: 30

      - name: Print build summary
        run: |
          echo "Build complete"
          ls -lh android/app/build/outputs/apk/debug/*.apk || true
          ls -lh HTN-v1.0.0-*-release.apk || true

  notify:
    name: Post build summary
    runs-on: ubuntu-latest
    needs: build-android
    if: always()
    steps:
      - name: Build result
        run: |
          if [ "${{ needs.build-android.result }}" == "success" ]; then
            echo "HTN Android build succeeded"
          else
            echo "HTN Android build failed"
          fi
